<section class="auth">
  <div class="card">
    <h1>Prijava</h1>

    <div class="field">
      <label for="login-email">E-pošta</label>
      <input id="login-email" name="email" type="email" [(ngModel)]="email" autocomplete="email">
    </div>

    <div class="field">
      <label for="login-password">Geslo</label>
      <div class="pw">
        <input id="login-password" name="password" [type]="show ? 'text' : 'password'" [(ngModel)]="password" autocomplete="current-password">
        <button
          type="button"
          class="eye"
          [attr.aria-label]="show ? 'Skrij geslo' : 'Prikaži geslo'"
          [attr.aria-pressed]="show"
          (click)="show = !show">
          <i class="fa-solid" aria-hidden="true" [class.fa-eye]="!show" [class.fa-eye-slash]="show"></i>
        </button>
      </div>
    </div>

    <div class="err" *ngIf="error">{{ error }}</div>

    <button class="btn primary" type="button" (click)="submit()">
      <i class="fa-solid fa-right-to-bracket" aria-hidden="true"></i>
      Prijavi me
    </button>

    <button class="link link-btn" type="button" (click)="goToRegister()">Nimam računa → Registracija</button>
  </div>
</section>
