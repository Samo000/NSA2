<section class="register-page">
  <form class="register-card" (ngSubmit)="submit()">
    <header class="head">
      <h1>Registracija</h1>
      <p>Ustvari nov uporabniški račun</p>
    </header>

    <div class="grid">
      <div class="field">
        <label class="sr-only" for="register-first-name">Ime</label>
        <input id="register-first-name" type="text" placeholder="Ime" [(ngModel)]="firstName" name="firstName">
      </div>

      <div class="field">
        <label class="sr-only" for="register-last-name">Priimek</label>
        <input id="register-last-name" type="text" placeholder="Priimek" [(ngModel)]="lastName" name="lastName">
      </div>

      <div class="field full">
        <label class="sr-only" for="register-email">E-pošta</label>
        <input id="register-email" type="email" placeholder="E-pošta" [(ngModel)]="email" name="email">
      </div>

      <div class="field">
        <label class="sr-only" for="register-password">Geslo</label>
        <input
          id="register-password"
          [type]="showPassword ? 'text' : 'password'"
          placeholder="Geslo"
          [(ngModel)]="password"
          name="password"
        >
        <button
          type="button"
          class="icon-btn"
          (click)="showPassword = !showPassword"
          [attr.aria-label]="showPassword ? 'Skrij geslo' : 'Prikaži geslo'"
          [attr.aria-pressed]="showPassword">
          <i class="fa-solid" aria-hidden="true" [ngClass]="showPassword ? 'fa-eye-slash' : 'fa-eye'"></i>
        </button>
      </div>

      <div class="field">
        <label class="sr-only" for="register-confirm-password">Potrditev gesla</label>
        <input
          id="register-confirm-password"
          [type]="showConfirm ? 'text' : 'password'"
          placeholder="Potrditev gesla"
          [(ngModel)]="confirmPassword"
          name="confirmPassword"
        >
        <button
          type="button"
          class="icon-btn"
          (click)="showConfirm = !showConfirm"
          [attr.aria-label]="showConfirm ? 'Skrij potrditev gesla' : 'Prikaži potrditev gesla'"
          [attr.aria-pressed]="showConfirm">
          <i class="fa-solid" aria-hidden="true" [ngClass]="showConfirm ? 'fa-eye-slash' : 'fa-eye'"></i>
        </button>
      </div>

      <div class="field full">
        <label class="sr-only" for="register-birth-date">Datum rojstva</label>
        <input id="register-birth-date" type="date" [(ngModel)]="birthDate" name="birthDate">
      </div>
    </div>

    <p class="error" *ngIf="error">{{ error }}</p>

    <button class="primary" type="submit">Registriraj se</button>
  </form>
</section>
