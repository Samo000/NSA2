<section class="login-page">
  <div class="login-card">
    <h1>Prijava</h1>
    <p>Dostopaj do košarice in naročil</p>

    <input type="email" placeholder="Email" [(ngModel)]="email">
    <input type="password" placeholder="Geslo" [(ngModel)]="password">

    <button (click)="submit()">Prijavi se</button>
  </div>
</section>
