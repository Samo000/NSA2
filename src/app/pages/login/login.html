<section class="auth">
  <div class="card">
    <h1>Prijava</h1>
    <p class="sub">Test račun: test@techmarket.si / Test123!</p>

    <div class="field">
      <label>E-pošta</label>
      <input type="email" [(ngModel)]="email" autocomplete="email">
    </div>

    <div class="field">
      <label>Geslo</label>
      <div class="pw">
        <input [type]="show ? 'text' : 'password'" [(ngModel)]="password" autocomplete="current-password">
        <button type="button" class="eye" (click)="show = !show">
          <i class="fa-solid" [class.fa-eye]="!show" [class.fa-eye-slash]="show"></i>
        </button>
      </div>
    </div>

    <div class="err" *ngIf="error">{{ error }}</div>

    <button class="btn primary" type="button" (click)="submit()">
      <i class="fa-solid fa-right-to-bracket"></i>
      Prijavi me
    </button>

    <a class="link" routerLink="/register">Nimam računa → Registracija</a>
  </div>
</section>
