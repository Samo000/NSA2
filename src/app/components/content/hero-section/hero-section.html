<section class="hero">
  <div class="hero-inner">
    <div class="copy">
      <h1>Zgradi svoj sanjski setup</h1>
      <p>Premium tech marketplace za računalnike, periferijo in opremo. Klikni izdelek, primerjaj specifikacije, dodaj v košarico.</p>

      <div class="highlights">
        <div class="pill"><i class="fa-solid fa-truck-fast" aria-hidden="true"></i><span>Hitra dostava</span></div>
        <div class="pill"><i class="fa-solid fa-shield-halved" aria-hidden="true"></i><span>Garancija</span></div>
        <div class="pill"><i class="fa-solid fa-circle-check" aria-hidden="true"></i><span>Preverjena ponudba</span></div>
      </div>
    </div>

    <div class="billboard" (mouseenter)="pause()" (mouseleave)="resume()">
      <div class="stage">
        <a
          class="slide"
          *ngFor="let s of slides; let i = index; trackBy: trackBySlug"
          [class.is-active]="i === index"
          [routerLink]="['/product', s.slug]"
          [attr.tabindex]="i === index ? '0' : '-1'"
          [attr.aria-hidden]="i === index ? null : 'true'">
          <img class="hero-img" [src]="s.src" alt="">
          <div class="shade"></div>
          <div class="caption">
            <div class="name">{{ s.name }}</div>
            <div class="price">{{ s.price }}</div>
          </div>
        </a>

        <div class="glow"></div>
      </div>

      <div class="dots">
        <button
          class="dot"
          *ngFor="let s of slides; let i = index; trackBy: trackBySlug"
          type="button"
          [class.is-on]="i === index"
          [attr.aria-label]="(i === index ? 'Current slide: ' : 'Show slide: ') + s.name"
          [attr.aria-current]="i === index ? 'true' : null"
          (click)="goTo(i)">
        </button>
      </div>
    </div>
  </div>
</section>
