<section class="hero">
  <div class="hero-inner">
    <div class="copy">
      <h1>Zgradi svoj sanjski setup</h1>
      <p>Premium tech marketplace za računalnike, periferijo in opremo. Klikni izdelek, primerjaj specifikacije, dodaj v košarico.</p>

      <div class="highlights">
        <div class="pill"><i class="fa-solid fa-truck-fast"></i><span>Hitra dostava</span></div>
        <div class="pill"><i class="fa-solid fa-shield-halved"></i><span>Garancija</span></div>
        <div class="pill"><i class="fa-solid fa-circle-check"></i><span>Preverjena ponudba</span></div>
      </div>
    </div>

    <div class="billboard" (mouseenter)="pause()" (mouseleave)="resume()">
      <div class="stage">
        <div class="slide"
             *ngFor="let s of slides; let i = index; trackBy: trackBySlug"
             [class.is-active]="i === index"
             (click)="open(s.slug)">
          <img class="hero-img" [src]="s.src" [alt]="s.alt">
          <div class="shade"></div>
          <div class="caption">
            <div class="name">{{ s.name }}</div>
            <div class="price">{{ s.price }}</div>
          </div>
        </div>

        <div class="glow"></div>
      </div>

      <div class="dots">
        <button
          class="dot"
          *ngFor="let s of slides; let i = index; trackBy: trackBySlug"
          type="button"
          [class.is-on]="i === index"
          (click)="goTo(i)">
        </button>
      </div>
    </div>
  </div>
</section>
