<section id="products" class="products">
  <h2>Izbrani izdelki</h2>

  <div class="grid">
    <div class="card" *ngFor="let p of products">
      <div class="image-frame">
        <img [src]="p.src" [alt]="p.alt">
      </div>
      <h3>{{ p.name }}</h3>
      <p>{{ p.price }}</p>
    </div>
  </div>
</section>
