<section id="products" class="products">
  <div class="head">
    <h2>Izbrani izdelki</h2>
    <p>Klikni izdelek za podrobnosti.</p>
  </div>

  <div class="grid">
    <a class="card" *ngFor="let p of products" [routerLink]="['/product', p.slug]">
      <div class="media">
        <img [src]="p.src" alt="">
      </div>

      <div class="meta">
        <h3>{{ p.name }}</h3>
        <div class="row">
          <span class="price">{{ p.price }}</span>
          <span class="pill">Poglej</span>
        </div>
      </div>
    </a>
  </div>
</section>
