<header class="navbar">
  <div class="navbar__inner">
    <a class="brand" routerLink="/">
      <span>TechMarket</span>
    </a>

    <nav class="nav">
      <a routerLink="/">Domov</a>
      <a routerLink="/izdelki">Izdelki</a>
      <a routerLink="/o-nas">O nas</a>
      <a routerLink="/kontakt">Kontakt</a>
      <a routerLink="/wishlist">Wishlist</a>
      <a *ngIf="auth.getUser()?.role === 'admin'" routerLink="/admin">Admin</a>
    </nav>

    <div class="actions">
      <a *ngIf="!auth.isLoggedIn()" routerLink="/login">
        <i class="fa-solid fa-right-to-bracket"></i>
        Prijava
      </a>

      <a *ngIf="!auth.isLoggedIn()" class="primary" routerLink="/register">
        <i class="fa-solid fa-user-plus"></i>
        Registracija
      </a>

      <a *ngIf="auth.isLoggedIn()" routerLink="/cart" class="cart-link">
        <i class="fa-solid fa-cart-shopping"></i>
        Kosarica
        <span class="cart-badge" *ngIf="cart.items().length > 0">{{ cart.items().length }}</span>
      </a>

      <button *ngIf="auth.isLoggedIn()" type="button" (click)="logout()">
        <i class="fa-solid fa-right-from-bracket"></i>
        Odjava
      </button>
    </div>

    <button class="burger" type="button" aria-label="Menu">
      <i class="fa-solid fa-bars"></i>
    </button>
  </div>
</header>
